{% extends 'base.html' %}

{% block title %}Home{% endblock %}

{% block content %}
<div class="text-center">
    <div class="card shadow rounded-4 p-5">
        <h2 class="mb-3">Welcome, {{ request.user.username }} 👋</h2>
        <p class="lead text-muted">Manage your tasks efficiently with Smart Task Manager.</p>

        <div class="mt-4">
            <a href="{% url 'task_list' %}" class="btn btn-primary btn-lg me-2">Go to Tasks</a>
            <a href="{% url 'logout' %}" class="btn btn-outline-danger btn-lg">Logout</a>
        </div>
    </div>
</div>
{% endblock %}
